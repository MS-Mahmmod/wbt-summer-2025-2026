<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body>

    <form method="post">
    <h2> Create your account</h2>
        <p>Join us in a couple of steps.</p>

        <div class="form card">
            <div class="name">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Jane Doe">
            </div>

            <div class="form">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="28">
            </div>

            <div class="form">
                <label for="birthday">Birthday</label>
                <input type="text" id="birthday" name="birthday" placeholder="25/06/2026">
            </div>

            <div class="form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="jane@example.com">
            </div>

            <div class="form">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="........">
            </div>

            <div class="contact">
                <label for="contact">Preferred Contact </label>
                <input type="radio" id="mail" name="contact" selected>
                <label for="mail">Email</label>
                <input type="radio" id="phone" name="contact">
                <label for="phone">Phone</label>
                <input type="radio" id="sms" name="contact">
                <label for="sms">SMS</label>
            </div>

            <div class="btn">
                <button type="submit" class="btn primary">Submit</button>
                <button type="reset" class="btn secondary">Reset</button>
            </div>

        </div>


        </div>


    </form>
    
</body>
</html>
