<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>

<body>
    <form method="post">
        <h2> Registration</h2>
        <p>Please complete all fields below.</p>
        <hr>

        <div class="form card">
            <div class="name">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name">
            </div>

            <div class="form">
                <label for="postal">Postal Code</label>
                <input type="number" id="postal" name="postal">
            </div>

            <div class="form">
                <label for="birthday">Birthday</label>
                <input type="text" id="birthday" name="birthday">
            </div>

            <div class="form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="form">
                <label for="country">Country</label>
                <select id="country" name="country">
                    <option value="">Select your country</option>
                    <option value="usa">USA</option>
                    <option value="canada">Canada</option>
                    <option value="uk">UK</option>
                    <option value="australia">Australia</option>
                </select>
            </div>

            <div class="btn">
                <button type="submit" class="btn primary" value="Submit">Submit</button>
                <button type="reset" class="btn secondary" value="Reset">Reset</button>
            </div>

        </div>


    </form>

</body>

</html>
