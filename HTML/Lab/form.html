<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doner Information</title>
</head>

<body>

    <h1>Doner Information</h1>

    <form method="post">

        <table>
            <tr>
                <td>
                    <label for="f_name">First Name*</label>
                </td>
                <td>
                    <input type="text" id="f_name" name="f_name" required>
                </td>
            </tr>
            
            <tr>
                <td>
                    <label for="l_name">Last Name*</label>
                </td>
                <td>
                    <input type="text" id="l_name" name="l_name" required>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="company">Company</label>
                </td>
                <td>
                    <input type="text" id="company" name="company" required>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="address1">Address 1*</label>
                </td>
                <td>
                    <input type="text" id="address1" name="address1" required>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="address2">Address 2</label>
                </td>
                <td>
                    <input type="text" id="address2" name="address2">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="city">City*</label>
                </td>
                <td>
                    <input type="text" id="city" name="city" required>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="state">State*</label>
                </td>
                <td>
                    <select name="state" id="state" required>
                        <option value="" selected>Select your state</option>
                        <option value="dhaka">Dhaka</option>
                        <option value="chottogram">Chottogram</option>
                        <option value="rajshahi">Rajshahi</option>
                        <option value="sylhet">Sylhet</option>
                        <option value="other">Other</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="zip">Zip Code*</label>
                </td>
                <td>
                    <input type="number" id="zip" name="zip" required>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="country">Country*</label>
                </td>
                <td>
                    <select name="country" id="country" required>
                        <option value="" selected>Select your country</option>
                        <option value="bangladesh">Bangladesh</option>
                        <option value="india">India</option>
                        <option value="pakistan">Pakistan</option>
                        <option value="other">Other</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="phone">Phone</label>
                </td>
                <td>
                    <input type="tel" id="phone" name="phone">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="fax">Fax</label>
                </td>
                <td>
                    <input type="text" id="fax" name="fax">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="email">Email*</label>
                </td>
                <td>
                    <input type="email" id="email" name="email" required>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="donation_amount">Donation Amount*</label>
                    <br>
                    (check a button or type in your amount)
                </td>
                <td>
                    <input type="radio" id="donation_amount" name="donation_amount" value="0" required>
                    <label for="donation_amount">None</label>
                    <input type="radio" id="donation_amount1" name="donation_amount" value="50" required>
                    <label for="donation_amount">$50</label>
                    <input type="radio" id="donation_amount2" name="donation_amount" value="75" required>
                    <label for="donation_amount2">$75</label>
                    <input type="radio" id="donation_amount3" name="donation_amount" value="100" required>
                    <label for="donation_amount3">$100</label>
                    <input type="radio" id="donation_amount4" name="donation_amount" value="other" required>
                    <label for="donation_amount4">Other</label>
                </td>
            </tr>
            <tr>
                <td>

                </td>
                <td>
                    <label for="other_amount">Other Amount $</label>
                    <input type="number" id="other_amount" name="other_amount">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="agree">Recurring Donation</label>
                    <br>
                    (check if yes)
                </td>
                <td>
                    <input type="checkbox" id="agree" name="agree">
                    <label for="agree">I am interested in giving on a regular basis</label>
                </td>
            </tr>

            <tr>
                <td>

                </td>
                <td>
                    <label for="month_amount">Monthly Credit Card $</label>
                    <input type="number" id="month_amount" name="month_amount">
                    For
                    <input type="number" id="month_duration" name="month_duration"> Months
                </td>
            </tr>
        </table>
        <h1>Honorarium and Memorial Donation Information</h1>
        <table>
            <tr>
                <td>
                    <label for="donation_status"> I would like to make this donation</label>
                    <br>
                </td>
                <td>
                    <input type="radio" id="donation_status1" name="donation_status" value="in_honor" >
                    <label for="donation_status1">In Honor</label>
                    <br>
                    <input type="radio" id="donation_status2" name="donation_status" value="in_memory" >
                    <label for="donation_status2">In Memory of</label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="name"> Name</label>
                </td>
                <td>
                    <input type="text" id="name" name="name" >
                </td>
            </tr>
            <tr>
                <td>
                    <label for="acknowledgement">Acknowledge Donation to</label>
                </td>
                <td>
                    <input type="text" id="acknowledgement" name="acknowledgement">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="address_donation"> Address</label>
                </td>
                <td>
                    <input type="text" id="address_donation" name="address_donation">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="city_donation">City</label>
                </td>
                <td>
                    <input type="text" id="city_donation" name="city_donation" required>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="state_donation">State</label>
                </td>
                <td>
                    <select name="state_donation" id="state_donation" required>
                        <option value="" selected>Select your state</option>
                        <option value="dhaka">Dhaka</option>
                        <option value="chottogram">Chottogram</option>
                        <option value="rajshahi">Rajshahi</option>
                        <option value="sylhet">Sylhet</option>
                        <option value="other">Other</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="zip_donation">Zip</label>
                </td>
                <td>
                    <input type="number" id="zip_donation" name="zip_donation" required>
                </td>
            </tr>




        




        
            <tr>
                <td>

                </td>
                <td>
                    <button type="reset">Reset</button>
                    <button type="submit">Continue</button>
                </td>
            </tr>


        </table>
    </form>

</body>

</html>
